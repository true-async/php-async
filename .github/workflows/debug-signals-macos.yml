name: Debug — macOS multi-signum

on:
  workflow_dispatch:
    inputs:
      reset_cache:
        description: 'Reset build cache (rebuild from scratch)'
        required: false
        default: 'false'

jobs:
  debug-signals:
    name: "DEBUG_MACOS_ARM64_ZTS_SIGNAL"
    runs-on: macos-14

    steps:
      - name: Checkout php-async repo
        uses: actions/checkout@v4
        with:
          path: async

      - name: Clone php-src (true-async-stable)
        run: |
          git clone --depth=1 --branch=true-async-stable https://github.com/true-async/php-src php-src

      - name: Copy php-async extension into php-src
        run: |
          mkdir -p php-src/ext/async
          cp -r async/* php-src/ext/async/

      - name: Compute cache key
        id: cache_key
        run: |
          # Cache PHP build separately from ext/async — only invalidate when
          # the configure inputs or PHP core sources change. ext/async is
          # rebuilt every run.
          cd php-src
          KEY=$(git rev-parse HEAD)
          echo "php_src_sha=$KEY" >> $GITHUB_OUTPUT

      - name: Restore cached PHP build
        id: cache_restore
        if: github.event.inputs.reset_cache != 'true'
        uses: actions/cache/restore@v4
        with:
          path: php-build-snapshot.tar
          key: php-debug-zts-${{ steps.cache_key.outputs.php_src_sha }}-v5

      - name: Unpack cached PHP build
        if: steps.cache_restore.outputs.cache-hit == 'true'
        run: |
          tar -xf php-build-snapshot.tar
          # Re-copy ext/async — diagnostic instrumentation may differ from the cached version
          rm -rf php-src/ext/async
          mkdir -p php-src/ext/async
          cp -r async/* php-src/ext/async/

      - name: Install build dependencies via Homebrew
        run: |
          set -x
          formula_installer="$(brew --repo)"/Library/Homebrew/formula_installer.rb
          code=" keg.link\(verbose: verbose\?"
          sudo sed -Ei '' "s/$code.*/$code, overwrite: true\)/" "$formula_installer"
          brew uninstall --ignore-dependencies cmake || true
          brew reinstall autoconf webp tidy-html5 libzip libsodium icu4c curl
          brew install bison re2c bzip2 enchant libffi intltool libiconv t1lib libxml2 libjpeg libxslt libuv

      - name: Print libuv info
        run: |
          brew info libuv | head -20
          ls -la $(brew --prefix)/opt/libuv/lib/

      - name: Configure PHP (only if cache miss)
        if: steps.cache_restore.outputs.cache-hit != 'true'
        working-directory: php-src
        run: |
          set -x
          BREW_OPT="$(brew --prefix)"/opt
          export PATH="$BREW_OPT/bison/bin:$PATH"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$BREW_OPT/openssl@1.1/lib/pkgconfig"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$BREW_OPT/curl/lib/pkgconfig"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$BREW_OPT/libffi/lib/pkgconfig"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$BREW_OPT/libxml2/lib/pkgconfig"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$BREW_OPT/libxslt/lib/pkgconfig"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$BREW_OPT/zlib/lib/pkgconfig"
          export PKG_CONFIG_PATH="$PKG_CONFIG_PATH:$BREW_OPT/icu4c/lib/pkgconfig"
          sed -i -e 's/Requires.private:.*//g' "$BREW_OPT/curl/lib/pkgconfig/libcurl.pc"

          ./buildconf --force
          ./configure \
            --enable-option-checking=fatal \
            --prefix=/usr/local \
            --without-pear \
            --disable-cgi \
            --disable-fpm \
            --disable-phpdbg \
            --enable-pcntl \
            --enable-posix \
            --enable-sockets \
            --enable-debug \
            --enable-zts \
            --enable-async \
            --with-config-file-path=/etc \
            --with-config-file-scan-dir=/etc/php.d

      - name: Build PHP (only if cache miss)
        if: steps.cache_restore.outputs.cache-hit != 'true'
        run: |
          export PATH="$(brew --prefix)/opt/bison/bin:$PATH"
          cd php-src
          make -j$(sysctl -n hw.logicalcpu)

      - name: Snapshot & cache PHP build
        if: steps.cache_restore.outputs.cache-hit != 'true'
        run: |
          # Snapshot the whole php-src tree (minus ext/async, which we always
          # copy fresh, and .git which is huge & useless).
          tar --exclude='php-src/ext/async' --exclude='php-src/.git' \
              -cf php-build-snapshot.tar php-src

      - name: Save PHP build to cache
        if: steps.cache_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: php-build-snapshot.tar
          key: php-debug-zts-${{ steps.cache_key.outputs.php_src_sha }}-v5

      - name: Force-rebuild ext/async (pick up diagnostic instrumentation)
        run: |
          export PATH="$(brew --prefix)/opt/bison/bin:$PATH"
          cd php-src
          rm -f ext/async/*.lo ext/async/*.o ext/async/*.dep
          make -j$(sysctl -n hw.logicalcpu) ext/async/libuv_reactor.lo ext/async/async.lo
          make sapi/cli/php

      - name: PHP version sanity
        run: |
          ./php-src/sapi/cli/php -v
          ./php-src/sapi/cli/php -r 'echo extension_loaded("async") ? "async OK\n" : "async MISSING\n";'

      # ===== Diagnostic step 1: pure libuv repro (no PHP) =====
      - name: Build & run libuv-only multi-signum test
        timeout-minutes: 1
        run: |
          cat > /tmp/libuv_signal_repro.c <<'EOF'
          #include <stdio.h>
          #include <signal.h>
          #include <unistd.h>
          #include <string.h>
          #include <uv.h>

          static uv_signal_t s1, s2;
          static uv_timer_t kill_timer, exit_timer;
          static int caught_signum = 0;

          static void on_signal(uv_signal_t *h, int signum) {
              fprintf(stderr, "[uv] caught signum=%d\n", signum);
              caught_signum = signum;
              /* Stop BOTH watchers so the loop can exit */
              uv_signal_stop(&s1);
              uv_signal_stop(&s2);
              uv_timer_stop(&kill_timer);
              uv_timer_stop(&exit_timer);
          }

          static void dump_sigaction(int sig, const char *tag) {
              struct sigaction sa;
              sigaction(sig, NULL, &sa);
              fprintf(stderr, "[sa-%s] sig=%d handler=%p flags=0x%x\n",
                      tag, sig, (void*)sa.sa_handler, sa.sa_flags);
          }

          static void after_kill(uv_timer_t *t) {
              fprintf(stderr, "[timer] sending SIGUSR1\n");
              dump_sigaction(SIGUSR1, "before-kill");
              kill(getpid(), SIGUSR1);
          }

          static void exit_guard(uv_timer_t *t) {
              fprintf(stderr, "[exit-guard] timeout — signal never delivered to libuv (caught_signum=%d)\n", caught_signum);
              uv_signal_stop(&s1);
              uv_signal_stop(&s2);
              uv_timer_stop(&kill_timer);
              uv_timer_stop(t);
          }

          int main(void) {
              uv_loop_t *loop = uv_default_loop();

              fprintf(stderr, "[main] init s1 SIGUSR1\n");
              uv_signal_init(loop, &s1);
              dump_sigaction(SIGUSR1, "after-init1");
              uv_signal_start(&s1, on_signal, SIGUSR1);
              dump_sigaction(SIGUSR1, "after-start1");

              fprintf(stderr, "[main] init s2 SIGUSR2\n");
              uv_signal_init(loop, &s2);
              uv_signal_start(&s2, on_signal, SIGUSR2);
              dump_sigaction(SIGUSR1, "after-start2-u1");
              dump_sigaction(SIGUSR2, "after-start2-u2");

              uv_timer_init(loop, &kill_timer);
              uv_timer_start(&kill_timer, after_kill, 100, 0);

              uv_timer_init(loop, &exit_timer);
              uv_timer_start(&exit_timer, exit_guard, 3000, 0);

              fprintf(stderr, "[main] uv_run\n");
              int r = uv_run(loop, UV_RUN_DEFAULT);
              fprintf(stderr, "[main] uv_run returned %d, caught_signum=%d\n", r, caught_signum);
              return caught_signum == SIGUSR1 ? 0 : 1;
          }
          EOF
          BREW_OPT="$(brew --prefix)/opt"
          cc -g -O0 -I$BREW_OPT/libuv/include -L$BREW_OPT/libuv/lib -luv -o /tmp/libuv_repro /tmp/libuv_signal_repro.c
          echo "===== running pure-libuv repro ====="
          /tmp/libuv_repro && echo "RESULT: libuv caught SIGUSR1 — pure libuv path works" \
                          || echo "RESULT: libuv DID NOT catch SIGUSR1 (exit=$?) — bug is in libuv on macOS"
          echo "===== end pure-libuv repro ====="

      # ===== Diagnostic step 2: run failing PHP test with sigaction tracing =====
      - name: Run failing test with diagnostics
        timeout-minutes: 1
        working-directory: php-src
        run: |
          export ASYNC_DEBUG_SIGNALS=1
          # The .phpt SKIPIF skips on Darwin — run the .php directly to bypass
          PHP_FILE=$(mktemp /tmp/sig_test.XXXXXX.php)
          cat > "$PHP_FILE" <<'EOF'
          <?php
          use Async\Signal;
          use function Async\signal;
          use function Async\spawn;
          use function Async\delay;
          use function Async\await_any_or_fail;

          spawn(function () {
              delay(50);
              fprintf(STDERR, "[php] sending SIGUSR1\n");
              posix_kill(getmypid(), SIGUSR1);
          });

          fprintf(STDERR, "[php] before await_any_or_fail\n");
          $signal = await_any_or_fail([
              signal(Signal::SIGUSR1),
              signal(Signal::SIGUSR2),
          ]);
          fprintf(STDERR, "[php] got: " . $signal->name . "\n");
          EOF
          echo "===== running failing PHP scenario ====="
          # Wrap in `timeout` so we never block the workflow if the script hangs.
          # macOS doesn't ship `timeout`; use a bash kill-after-N pattern.
          ( ./sapi/cli/php "$PHP_FILE" 2>&1 ) &
          pid=$!
          ( sleep 10; kill -TERM $pid 2>/dev/null ) &
          watchdog=$!
          wait $pid
          ec=$?
          kill $watchdog 2>/dev/null || true
          echo "[exit-code: $ec]"
          case $ec in
            0)   echo "RESULT: PHP path works on this machine" ;;
            138) echo "RESULT: PHP killed by SIGUSR1 default handler — libuv handler not in effect at delivery time" ;;
            124) echo "RESULT: PHP hung — signal never delivered or libuv loop stalled" ;;
            *)   echo "RESULT: unexpected exit ($ec)" ;;
          esac
          echo "===== end failing PHP scenario ====="
